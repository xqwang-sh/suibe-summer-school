<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">China listed-company market capitalisation as a share of GDP, 2003-2024</title>
  <desc id="desc">A China-only line chart with chronology markers for the 2005 split-share reform, 2014 Stock Connect, 2019 STAR Market, and 2023 full registration.</desc>
  <rect width="1000" height="500" fill="#fffdf7"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="70" y="38" fill="#172132" font-family="Georgia, serif" font-size="25" font-weight="700">China equity-market size is large—and highly cyclical</text>
    <text x="70" y="63" fill="#6f746f" font-size="14">Listed-company market capitalisation, percent of GDP</text>
    <g stroke="#d9d6cd" stroke-width="1">
      <line x1="75" y1="400" x2="935" y2="400"/><line x1="75" y1="308" x2="935" y2="308"/>
      <line x1="75" y1="216" x2="935" y2="216"/><line x1="75" y1="124" x2="935" y2="124"/>
    </g>
    <g fill="#6f746f" font-size="12" text-anchor="end">
      <text x="66" y="404">0</text><text x="66" y="312">40</text><text x="66" y="220">80</text><text x="66" y="128">120</text>
    </g>
    <g stroke="#c9583e" stroke-width="1.5" stroke-dasharray="5 4">
      <line x1="160" y1="85" x2="160" y2="400"/><line x1="520" y1="85" x2="520" y2="400"/>
      <line x1="720" y1="85" x2="720" y2="400"/><line x1="880" y1="85" x2="880" y2="400"/>
    </g>
    <g fill="#c9583e" font-size="11" font-weight="700" text-anchor="middle">
      <text x="160" y="82">2005 split-share</text><text x="520" y="96">2014 Stock Connect</text>
      <text x="720" y="82">2019 STAR</text><text x="880" y="96">2023 full registration</text>
    </g>
    <polyline fill="none" stroke="#4b718a" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"
      points="80,330 120,348 160,360 200,306 240,114 280,312 320,242 360,250 400,298 440,302 480,307 520,271 560,233 600,253 640,240 680,297 720,265 760,212 800,218 840,256 880,262 920,256"/>
    <g fill="#4b718a" stroke="#fffdf7" stroke-width="2">
      <circle cx="80" cy="330" r="4"/><circle cx="120" cy="348" r="4"/><circle cx="160" cy="360" r="4"/>
      <circle cx="200" cy="306" r="4"/><circle cx="240" cy="114" r="4"/><circle cx="280" cy="312" r="4"/>
      <circle cx="320" cy="242" r="4"/><circle cx="360" cy="250" r="4"/><circle cx="400" cy="298" r="4"/>
      <circle cx="440" cy="302" r="4"/><circle cx="480" cy="307" r="4"/><circle cx="520" cy="271" r="4"/>
      <circle cx="560" cy="233" r="4"/><circle cx="600" cy="253" r="4"/><circle cx="640" cy="240" r="4"/>
      <circle cx="680" cy="297" r="4"/><circle cx="720" cy="265" r="4"/><circle cx="760" cy="212" r="4"/>
      <circle cx="800" cy="218" r="4"/><circle cx="840" cy="256" r="4"/><circle cx="880" cy="262" r="4"/>
      <circle cx="920" cy="256" r="5"/>
    </g>
    <g fill="#6f746f" font-size="12" text-anchor="middle">
      <text x="80" y="423">2003</text><text x="160" y="423">2005</text><text x="360" y="423">2010</text>
      <text x="560" y="423">2015</text><text x="760" y="423">2020</text><text x="920" y="423">2024</text>
    </g>
    <text x="920" y="244" fill="#4b718a" font-size="13" font-weight="700" text-anchor="end">62.77%</text>
    <text x="70" y="468" fill="#6f746f" font-size="11">Source: World Bank WDI, CM.MKT.LCAP.GD.ZS. Policy markers show chronology, not estimated causal effects.</text>
  </g>
</svg>
